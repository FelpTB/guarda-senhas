<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassVault Pro - Gestor de Acessos</title>
    <!-- Bibliotecas externas via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        /* Customização da barra de rolagem */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // CONFIGURAÇÃO: DEFINA A SENHA DO COFRE AQUI
        // ==========================================
        const MASTER_VAULT_PASSWORD = "chave_mestra"; 

        // Tipos de Registos Suportados
        const ENTRY_TYPES = {
            LOGIN: 'Login',
            API_KEY: 'Chave_Api',
            CONN_STRING: 'Connection String',
            NOTE: 'Anotação'
        };

        // Componente utilitário para ícones Lucide
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // Estados Globais
            const [items, setItems] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isLocked, setIsLocked] = useState(true);
            const [passwordAttempt, setPasswordAttempt] = useState('');
            const [notification, setNotification] = useState(null);
            
            // Estado do Formulário de Novo Registo
            const [formType, setFormType] = useState(ENTRY_TYPES.LOGIN);
            const [formData, setFormData] = useState({
                service: '', username: '', password: '', key: '', connectionString: '', title: '', content: ''
            });

            // Efeito para carregar dados do disco local
            useEffect(() => {
                const saved = localStorage.getItem('passvault_pro_data_v2');
                if (saved) {
                    try { setItems(JSON.parse(saved)); } catch (e) { console.error("Erro ao carregar dados", e); }
                }
            }, []);

            // Efeito para guardar dados sempre que houver alterações
            useEffect(() => {
                localStorage.setItem('passvault_pro_data_v2', JSON.stringify(items));
            }, [items]);

            // Sistema de Notificações Temporárias
            const showNotification = (message) => {
                setNotification(message);
                setTimeout(() => setNotification(null), 2500);
            };

            // Função para copiar para a área de transferência
            const copy = (text, label) => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showNotification(`${label} copiado!`);
            };

            // Lógica de Desbloqueio do Cofre
            const handleUnlock = (e) => {
                e.preventDefault();
                if (passwordAttempt === MASTER_VAULT_PASSWORD) {
                    setIsLocked(false);
                    setPasswordAttempt('');
                } else {
                    showNotification("Senha mestra incorreta.");
                }
            };

            // Lógica para Guardar Novo Item
            const handleSave = (e) => {
                e.preventDefault();
                const newEntry = {
                    ...formData,
                    id: Date.now(),
                    type: formType,
                    date: new Date().toLocaleDateString()
                };
                setItems([newEntry, ...items]);
                setIsModalOpen(false);
                setFormData({ service: '', username: '', password: '', key: '', connectionString: '', title: '', content: '' });
                showNotification("Registo guardado com sucesso!");
            };

            // Eliminar um registo
            const deleteItem = (id) => {
                if(confirm("Tem a certeza que deseja eliminar este registo permanentemente?")) {
                    setItems(items.filter(i => i.id !== id));
                    showNotification("Registo removido.");
                }
            };

            // Filtro de Pesquisa
            const filteredItems = useMemo(() => {
                return items.filter(i => 
                    (i.service || i.title || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (i.username || '').toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [items, searchTerm]);

            // Interface de Bloqueio (Login)
            if (isLocked) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100 dark:bg-slate-950">
                        <div className="w-full max-w-md bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800 text-center animate-in fade-in duration-500">
                            <div className="w-20 h-20 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/30">
                                <Icon name="shield" size={40} className="text-white" />
                            </div>
                            <h1 className="text-2xl font-bold mb-2">PassVault Pro</h1>
                            <p className="text-slate-500 text-sm mb-8">Insira a senha mestra configurada para aceder aos seus dados.</p>
                            <form onSubmit={handleUnlock} className="space-y-4">
                                <input 
                                    type="password"
                                    className="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-center"
                                    placeholder="••••••••••••"
                                    value={passwordAttempt}
                                    onChange={e => setPasswordAttempt(e.target.value)}
                                    autoFocus
                                />
                                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">
                                    Desbloquear Cofre
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // Interface Principal do Cofre
            return (
                <div className="min-h-screen flex flex-col bg-slate-50 dark:bg-slate-950">
                    {/* Barra de Navegação Superior */}
                    <header className="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 sticky top-0 z-40 px-6 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="p-1.5 bg-indigo-600 rounded-lg text-white">
                                <Icon name="key-round" size={20} />
                            </div>
                            <span className="font-bold text-lg hidden sm:block">PassVault Pro</span>
                        </div>
                        
                        <div className="flex-1 max-w-md mx-6 relative">
                            <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                            <input 
                                type="text"
                                placeholder="Procurar serviços, usuários ou notas..."
                                className="w-full pl-10 pr-4 py-2 bg-slate-100 dark:bg-slate-800 border-none rounded-full text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                            />
                        </div>

                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsLocked(true)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors" title="Bloquear Cofre">
                                <Icon name="lock" />
                            </button>
                            <button onClick={() => setIsModalOpen(true)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-all active:scale-95 shadow-md shadow-indigo-500/20">
                                <Icon name="plus" size={18} /> <span className="hidden sm:inline">Adicionar Novo</span>
                            </button>
                        </div>
                    </header>

                    {/* Área Principal de Cartões */}
                    <main className="flex-1 p-6 max-w-7xl mx-auto w-full">
                        {filteredItems.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-32 text-slate-400 text-center">
                                <div className="w-16 h-16 bg-slate-100 dark:bg-slate-900 rounded-full flex items-center justify-center mb-4">
                                    <Icon name="folder-open" size={32} className="opacity-20" />
                                </div>
                                <h3 className="font-semibold text-slate-600 dark:text-slate-300">Cofre Vazio</h3>
                                <p className="text-sm">Não foram encontrados registos para a sua pesquisa.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in slide-in-from-bottom-4 duration-500">
                                {filteredItems.map(item => (
                                    <div key={item.id} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all relative group">
                                        {/* Botão de Apagar (visível ao passar o rato) */}
                                        <button onClick={() => deleteItem(item.id)} className="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                                            <Icon name="trash-2" size={16} />
                                        </button>

                                        {/* Cabeçalho do Cartão */}
                                        <div className="flex items-center gap-3 mb-5">
                                            <div className={`p-2 rounded-xl ${
                                                item.type === ENTRY_TYPES.LOGIN ? 'bg-blue-100 text-blue-600' :
                                                item.type === ENTRY_TYPES.API_KEY ? 'bg-amber-100 text-amber-600' :
                                                item.type === ENTRY_TYPES.CONN_STRING ? 'bg-emerald-100 text-emerald-600' : 'bg-purple-100 text-purple-600'
                                            }`}>
                                                <Icon name={
                                                    item.type === ENTRY_TYPES.LOGIN ? 'user' :
                                                    item.type === ENTRY_TYPES.API_KEY ? 'code-2' :
                                                    item.type === ENTRY_TYPES.CONN_STRING ? 'database' : 'sticky-note'
                                                } />
                                            </div>
                                            <div className="overflow-hidden">
                                                <h3 className="font-bold leading-tight truncate pr-4">{item.service || item.title}</h3>
                                                <span className="text-[10px] font-bold uppercase tracking-widest opacity-40">{item.type}</span>
                                            </div>
                                        </div>

                                        {/* Detalhes específicos por tipo */}
                                        <div className="space-y-4">
                                            {item.type === ENTRY_TYPES.LOGIN && (
                                                <>
                                                    <div className="flex justify-between items-center group/field">
                                                        <div className="overflow-hidden">
                                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Utilizador</p>
                                                            <p className="text-sm font-medium truncate">{item.username}</p>
                                                        </div>
                                                        <button onClick={() => copy(item.username, 'Utilizador')} className="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-slate-400 transition-colors" title="Copiar Utilizador">
                                                            <Icon name="copy" size={14}/>
                                                        </button>
                                                    </div>
                                                    <div className="flex justify-between items-center group/field">
                                                        <div>
                                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Senha</p>
                                                            <p className="text-sm font-mono tracking-widest">••••••••••••</p>
                                                        </div>
                                                        <button onClick={() => copy(item.password, 'Senha')} className="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-slate-400 transition-colors" title="Copiar Senha">
                                                            <Icon name="copy" size={14}/>
                                                        </button>
                                                    </div>
                                                </>
                                            )}

                                            {item.type === ENTRY_TYPES.API_KEY && (
                                                <div className="flex justify-between items-center group/field">
                                                    <div className="overflow-hidden">
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">API Key</p>
                                                        <p className="text-sm font-mono truncate bg-slate-50 dark:bg-slate-900/50 px-2 py-1 rounded">{item.key.substring(0, 10)}...</p>
                                                    </div>
                                                    <button onClick={() => copy(item.key, 'Chave API')} className="p-1.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-slate-400 transition-colors" title="Copiar Chave Completa">
                                                        <Icon name="copy" size={14}/>
                                                    </button>
                                                </div>
                                            )}

                                            {item.type === ENTRY_TYPES.CONN_STRING && (
                                                <div className="flex justify-between items-center group/field">
                                                    <div className="overflow-hidden pr-2">
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Connection String</p>
                                                        <p className="text-[11px] font-mono leading-relaxed break-all line-clamp-3 bg-slate-50 dark:bg-slate-900/50 p-2 rounded">{item.connectionString}</p>
                                                    </div>
                                                    <button onClick={() => copy(item.connectionString, 'String')} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg text-slate-400 shrink-0 self-end mb-1 transition-colors" title="Copiar String">
                                                        <Icon name="copy" size={14}/>
                                                    </button>
                                                </div>
                                            )}

                                            {item.type === ENTRY_TYPES.NOTE && (
                                                <div>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1.5">Conteúdo da Nota</p>
                                                    <div className="text-sm text-slate-600 dark:text-slate-400 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl max-h-40 overflow-y-auto custom-scrollbar leading-relaxed whitespace-pre-wrap">
                                                        {item.content}
                                                    </div>
                                                    <button onClick={() => copy(item.content, 'Anotação')} className="mt-3 w-full flex items-center justify-center gap-2 text-[10px] font-bold uppercase py-2 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-indigo-50 dark:hover:bg-indigo-900/20 hover:text-indigo-600 transition-all">
                                                        <Icon name="copy" size={12}/> Copiar Conteúdo
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Modal de Adição */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-md animate-in fade-in duration-300">
                            <div className="bg-white dark:bg-slate-800 w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-700 animate-in zoom-in-95 duration-300">
                                <div className="px-6 py-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/50">
                                    <h3 className="font-bold text-lg">Criar Novo Registo</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600 p-1">
                                        <Icon name="x" size={24} />
                                    </button>
                                </div>
                                
                                <form onSubmit={handleSave} className="p-6 space-y-5">
                                    {/* Seletor de Tipo */}
                                    <div>
                                        <label className="text-[10px] font-bold uppercase text-slate-400 mb-2 block tracking-widest">Tipo de Informação</label>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                                            {Object.values(ENTRY_TYPES).map(type => (
                                                <button 
                                                    key={type}
                                                    type="button"
                                                    onClick={() => {
                                                        setFormType(type);
                                                        // Reset form data partially if needed
                                                    }}
                                                    className={`py-2 px-1 text-[10px] font-bold rounded-xl border transition-all ${
                                                        formType === type 
                                                        ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg shadow-indigo-500/30' 
                                                        : 'bg-transparent border-slate-200 dark:border-slate-700 hover:border-indigo-400 text-slate-500'
                                                    }`}
                                                >
                                                    {type.replace('_', ' ')}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Campos Dinâmicos */}
                                    {(formType !== ENTRY_TYPES.NOTE) && (
                                        <div>
                                            <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block tracking-wider">Serviço / Site / App</label>
                                            <input required className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-inner" placeholder="ex: Amazon, MySQL, GitHub" value={formData.service} onChange={e => setFormData({...formData, service: e.target.value})} />
                                        </div>
                                    )}

                                    {formType === ENTRY_TYPES.LOGIN && (
                                        <>
                                            <div>
                                                <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block tracking-wider">Utilizador / E-mail</label>
                                                <input required className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-inner" placeholder="ex: jose@email.com" value={formData.username} onChange={e => setFormData({...formData, username: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block tracking-wider">Senha</label>
                                                <input required type="text" className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono shadow-inner" placeholder="••••••••" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} />
                                            </div>
                                        </>
                                    )}

                                    {formType === ENTRY_TYPES.API_KEY && (
                                        <div>
                                            <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block tracking-wider">Chave API (Secret Key)</label>
                                            <textarea required className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-xs shadow-inner" rows="3" placeholder="Insira a sua chave aqui..." value={formData.key} onChange={e => setFormData({...formData, key: e.target.value})}></textarea>
                                        </div>
                                    )}

                                    {formType === ENTRY_TYPES.CONN_STRING && (
                                        <div>
                                            <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block tracking-wider">String de Conexão</label>
                                            <textarea required className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-xs shadow-inner" rows="4" placeholder="ex: Server=myServerAddress;Database=myDataBase;User Id=myUsername;Password=myPassword;" value={formData.connectionString} onChange={e => setFormData({...formData, connectionString: e.target.value})}></textarea>
                                        </div>
                                    )}

                                    {formType === ENTRY_TYPES.NOTE && (
                                        <>
                                            <div>
                                                <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block tracking-wider">Título da Anotação</label>
                                                <input required className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold shadow-inner" placeholder="ex: Códigos de Recuperação" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold uppercase text-slate-400 mb-1 block tracking-wider">Conteúdo da Nota</label>
                                                <textarea required className="w-full p-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm shadow-inner" rows="6" placeholder="Escreva aqui as suas anotações livres..." value={formData.content} onChange={e => setFormData({...formData, content: e.target.value})}></textarea>
                                            </div>
                                        </>
                                    )}

                                    <div className="flex gap-3 pt-6">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-3 border border-slate-200 dark:border-slate-700 rounded-2xl font-bold hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">Cancelar</button>
                                        <button type="submit" className="flex-1 py-3 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">Guardar Registo</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Notificação Toast */}
                    {notification && (
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] bg-slate-900/90 backdrop-blur-md text-white px-8 py-3 rounded-2xl text-xs font-bold shadow-2xl animate-in slide-in-from-bottom-10 flex items-center gap-2 border border-slate-700">
                            <Icon name="check-circle" size={16} className="text-emerald-400" />
                            {notification}
                        </div>
                    )}

                    {/* Rodapé Informativo */}
                    <footer className="p-6 text-center text-slate-400 text-[10px] font-medium tracking-widest uppercase">
                        Proteção Local PassVault Pro &copy; 2024 - Todos os Dados Encriptados no Disco
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
